<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAKAD v4.5 - Sistem Informasi Akademik Terpadu</title>
    
    <!-- Link External: Tailwind CSS & Font Awesome Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Animasi halusan saat perpindahan tab */
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Menghilangkan scrollbar tapi fungsi scroll tetap aktif */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Menghilangkan panah pada input number */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        /* Style untuk notifikasi (Toast) */
        #toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1.2rem 2.5rem;
            border-radius: 1.2rem;
            color: white;
            font-weight: 800;
            z-index: 999;
            display: none;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transition: all 0.3s ease;
        }

        /* Gradient Background untuk Login */
        .bg-login-gradient {
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
        }
        
        .card-shadow {
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans leading-relaxed">

    <!-- Kontainer Notifikasi -->
    <div id="toast" class="animate-bounce"></div>

    <!-- Kontainer Utama Aplikasi -->
    <div id="app" class="min-h-screen w-full">
        <!-- Loader Awal: Muncul saat sinkronisasi database -->
        <div id="global-loader" class="flex flex-col items-center justify-center min-h-screen bg-blue-900 text-white">
            <div class="relative">
                <div class="w-24 h-24 border-4 border-blue-400 border-t-white rounded-full animate-spin"></div>
                <div class="absolute inset-0 flex items-center justify-center">
                    <i class="fas fa-university text-2xl"></i>
                </div>
            </div>
            <h1 class="text-3xl font-black mt-8 tracking-tighter italic">SIAKAD CLOUD</h1>
            <p id="status-info" class="text-blue-200 text-sm mt-3 opacity-70 font-medium uppercase tracking-widest">Sinkronisasi Data...</p>
            
            <div id="emergency-btn" class="mt-12 hidden animate-fade-in text-center">
                <p class="text-xs text-blue-400 mb-4 italic max-w-xs">Koneksi lambat? Pastikan Firebase Rules Anda 'allow read, write: if true;'.</p>
                <button onclick="window.forceDemoMode()" class="bg-white/10 hover:bg-white/20 text-white border border-white/30 py-4 px-10 rounded-2xl font-bold transition-all transform active:scale-95">
                    Gunakan Mode Demo (Offline)
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK & Application Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- KONFIGURASI FIREBASE ALFAN ---
        const firebaseConfig = {
            apiKey: "AIzaSyDXwDDOevS1D-ve6MLVZpmT5jyfMeEsoSg",
            authDomain: "web-siakad.firebaseapp.com",
            projectId: "web-siakad",
            storageBucket: "web-siakad.firebasestorage.app",
            messagingSenderId: "347368315268",
            appId: "1:347368315268:web:0eb8938c23eb629b2065d1",
            measurementId: "G-YD49Q3YJ0L"
        };

        // --- DATA KONSTANTA ---
        const SUBJECTS = ['Matematika', 'Bahasa Indonesia', 'IPA', 'IPS', 'Bahasa Inggris', 'PJOK', 'Seni Budaya'];
        const GRADE_COMPONENTS = [
            { id: 'keaktifan', label: 'Keaktifan' },
            { id: 'tugas', label: 'Tugas' },
            { id: 'kehadiran', label: 'Kehadiran' },
            { id: 'kesopanan', label: 'Kesopanan' }
        ];

        // --- STATE AWAL (DATA DEFAULT) ---
        const INITIAL_DB = {
            users: {
                'admin': { id: 'u0', username: 'admin', password: '123', role: 'admin', name: 'Alfan Admin' },
                'guru': { id: 'u1', username: 'guru', password: '123', role: 'guru', name: 'Drs. Bambang', subject: 'Matematika' },
                'siswa': { id: 'u2', username: 'siswa', password: '123', role: 'siswa', name: 'Budi Santoso', nis: '10001' }
            },
            students: [{ id: 'u2', name: 'Budi Santoso', nis: '10001' }],
            grades: {}, 
            attendance: {}, 
            history: {
                'u2': { avg: 85, attendance: '98%' }
            }
        };

        // --- GLOBAL STATE ---
        let state = {
            ...INITIAL_DB,
            user: null, 
            activeTab: 'dashboard',
            activeToken: null,
            attendedToday: [], 
            editingUser: null,
            isLoading: true,
            isOffline: false
        };

        let db, auth;

        // --- FUNGSI UTAMA (CORE) ---

        setTimeout(() => {
            const btn = document.getElementById('emergency-btn');
            if (state.isLoading && btn) btn.classList.remove('hidden');
        }, 7000);

        window.forceDemoMode = () => {
            showToast("Masuk ke Mode Demo (Data tidak disimpan ke Cloud)");
            updateState({ isLoading: false, isOffline: true });
        };

        // SINKRONISASI DATA KE CLOUD
        async function pushToCloud() {
            if (state.isOffline || !auth?.currentUser) return;
            try {
                // Menentukan jalur dokumen (6 segmen aman)
                const docRef = doc(db, 'siakad_data', 'main_records', 'v4_5_system', 'global_state');
                await setDoc(docRef, {
                    users: state.users,
                    students: state.students,
                    grades: state.grades,
                    attendance: state.attendance,
                    history: state.history
                }, { merge: true });
                console.log("Data berhasil disinkronkan ke Cloud.");
            } catch (err) {
                console.error("Gagal Sinkronisasi:", err);
                showToast("Gagal menyimpan ke Cloud! Cek Rules Firebase.", "error");
            }
        }

        function updateState(newState) {
            state = { ...state, ...newState };
            render();
        }

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            if (!t) return;
            t.innerText = msg;
            t.style.display = 'block';
            t.style.backgroundColor = type === 'success' ? '#10B981' : '#EF4444';
            setTimeout(() => { if(t) t.style.display = 'none'; }, 3000);
        }

        // --- HANDLERS ---

        window.handleLogin = (e) => {
            e.preventDefault();
            const u = e.target.username.value;
            const p = e.target.password.value;
            if (state.users[u] && state.users[u].password === p) {
                updateState({ user: state.users[u], activeTab: 'dashboard' });
                showToast(`Login Berhasil!`);
            } else {
                showToast('Username atau Password Salah!', 'error');
            }
        };

        window.handleLogout = () => {
            updateState({ user: null, activeTab: 'dashboard', activeToken: null });
        };

        window.switchTab = (tabId) => {
            updateState({ activeTab: tabId });
        };

        window.generateToken = () => {
            const token = Math.random().toString(36).substring(2, 7).toUpperCase();
            updateState({ activeToken: token, attendedToday: [] });
            showToast('Token Absensi Berhasil Dibuat');
        };

        window.submitToken = async (e) => {
            e.preventDefault();
            const t = e.target.token.value.toUpperCase();
            if (!state.activeToken) return showToast('Token belum diaktifkan guru!', 'error');
            
            if (t === state.activeToken) {
                if (!state.attendedToday.includes(state.user.id)) {
                    state.attendedToday.push(state.user.id);
                    const sid = state.user.id;
                    if (!state.attendance[sid]) state.attendance[sid] = { present: 0, total: 48 };
                    state.attendance[sid].present += 1;
                    
                    updateState({ attendedToday: state.attendedToday, attendance: state.attendance });
                    await pushToCloud();
                    showToast('Presensi Berhasil!');
                } else {
                    showToast('Sudah presensi hari ini!', 'error');
                }
            } else {
                showToast('Token Salah!', 'error');
            }
        };

        window.updateGradeValue = async (sid, subject, component, value) => {
            const numVal = Math.min(100, Math.max(0, parseInt(value) || 0));
            if (!state.grades[sid]) state.grades[sid] = {};
            if (!state.grades[sid][subject]) state.grades[sid][subject] = {};
            
            state.grades[sid][subject][component] = numVal;
            updateState({ grades: state.grades });
            await pushToCloud();
        };

        window.openEditUser = (username) => {
            updateState({ editingUser: { ...state.users[username], oldUsername: username } });
        };

        window.closeModal = () => {
            updateState({ editingUser: null });
        };

        window.saveUserData = async (e) => {
            e.preventDefault();
            const f = e.target;
            const newData = {
                id: state.editingUser.id,
                username: f.username.value,
                password: f.password.value,
                name: f.name.value,
                role: state.editingUser.role,
                subject: f.subject ? f.subject.value : state.editingUser.subject,
                nis: f.nis ? f.nis.value : state.editingUser.nis
            };

            if (state.editingUser.oldUsername !== newData.username && state.users[newData.username]) {
                return showToast('Username sudah digunakan!', 'error');
            }

            if (state.editingUser.oldUsername !== newData.username) {
                delete state.users[state.editingUser.oldUsername];
            }
            state.users[newData.username] = newData;

            if (newData.role === 'siswa') {
                const idx = state.students.findIndex(s => s.id === newData.id);
                if (idx !== -1) state.students[idx] = { id: newData.id, name: newData.name, nis: newData.nis };
            }

            updateState({ users: state.users, students: state.students, editingUser: null });
            await pushToCloud();
            showToast('Data Disimpan ke Cloud');
        };

        window.addNewUser = async (role) => {
            const name = prompt(`Nama Lengkap ${role}:`);
            if (!name) return;
            const un = prompt(`Username untuk login:`);
            if (!un || state.users[un]) return showToast('Username tidak valid!', 'error');
            
            const id = (role === 'siswa' ? 's' : 'g') + Date.now();
            const newUser = { id, username: un, password: '123', role, name };
            
            if (role === 'guru') newUser.subject = SUBJECTS[0];
            if (role === 'siswa') {
                newUser.nis = '10' + (100 + state.students.length);
                state.students.push({ id, name, nis: newUser.nis });
            }
            
            state.users[un] = newUser;
            updateState({ users: state.users, students: state.students });
            await pushToCloud();
            showToast(`${role} ditambahkan.`);
        };

        window.deleteUserRecord = async (un) => {
            if (!confirm('Hapus pengguna ini secara permanen?')) return;
            const u = state.users[un];
            if (u.role === 'siswa') state.students = state.students.filter(s => s.id !== u.id);
            delete state.users[un];
            updateState({ users: state.users, students: state.students });
            await pushToCloud();
            showToast('Dihapus dari Cloud');
        };

        // --- RENDERER UI ---

        function render() {
            const app = document.getElementById('app');
            if (state.isLoading) return; 

            if (!state.user) {
                app.innerHTML = `<div class="flex items-center justify-center min-h-screen bg-login-gradient p-4 w-full">${getLoginLayout()}</div>`;
            } else {
                app.innerHTML = `
                <div class="flex flex-col md:flex-row min-h-screen w-full bg-gray-50">
                    ${getSidebarLayout()}
                    <main class="flex-1 p-4 md:p-8 overflow-y-auto">
                        <div class="max-w-6xl mx-auto animate-fade-in">
                            ${getContentLayout()}
                        </div>
                    </main>
                    ${getModalLayout()}
                </div>`;
            }
        }

        function getLoginLayout() {
            return `
            <div class="bg-white rounded-[40px] shadow-2xl w-full max-w-md overflow-hidden animate-fade-in border-4 border-white/20">
                <div class="bg-blue-600 p-12 text-center text-white relative">
                    <div class="bg-white w-24 h-24 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-2xl text-blue-600">
                        <i class="fas fa-university text-5xl"></i>
                    </div>
                    <h1 class="text-4xl font-black italic tracking-tighter">SIAKAD v4.5</h1>
                    <p class="opacity-80 text-xs mt-2 uppercase font-black tracking-widest">${state.isOffline ? 'OFFLINE MODE' : 'CLOUD CONNECTED'}</p>
                </div>
                <form onsubmit="window.handleLogin(event)" class="p-10 space-y-8">
                    <div>
                        <label class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Username</label>
                        <input type="text" name="username" required class="w-full border-b-2 border-gray-100 py-3 focus:border-blue-500 outline-none font-bold text-gray-700 bg-transparent">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Password</label>
                        <input type="password" name="password" required class="w-full border-b-2 border-gray-100 py-3 focus:border-blue-500 outline-none font-bold text-gray-700 bg-transparent">
                    </div>
                    <button class="w-full bg-blue-600 text-white font-black py-6 rounded-[24px] shadow-xl hover:bg-blue-700 transition transform active:scale-95 uppercase">MASUK</button>
                </form>
            </div>`;
        }

        function getSidebarLayout() {
            const u = state.user;
            const nav = [{ id: 'dashboard', label: 'Beranda', icon: 'fa-home' }];
            if (u.role === 'admin') {
                nav.push({ id: 'guru', label: 'Data Guru', icon: 'fa-user-tie' }, { id: 'siswa', label: 'Data Siswa', icon: 'fa-user-graduate' });
            } else {
                nav.push({ id: 'absen', label: 'Presensi', icon: 'fa-calendar-check' }, { id: 'nilai', label: 'Nilai Akademik', icon: 'fa-star' });
            }
            return `
            <aside class="w-full md:w-72 bg-white border-r border-gray-100 flex flex-col shadow-sm">
                <div class="p-10 border-b border-gray-50 flex items-center space-x-4 text-blue-600">
                    <div class="bg-blue-600 p-3 rounded-2xl text-white shadow-lg"><i class="fas fa-graduation-cap"></i></div>
                    <span class="font-black text-2xl italic">SIAKAD</span>
                </div>
                <nav class="p-6 flex-1 space-y-3">
                    ${nav.map(i => `
                        <button onclick="window.switchTab('${i.id}')" class="w-full flex items-center space-x-5 px-6 py-5 rounded-[20px] transition font-bold text-sm ${state.activeTab===i.id?'bg-blue-600 text-white shadow-xl shadow-blue-100':'text-gray-400 hover:bg-gray-50 hover:text-blue-600'}">
                            <i class="fas ${i.icon} w-6 text-center"></i><span>${i.label}</span>
                        </button>
                    `).join('')}
                </nav>
                <div class="p-6 border-t border-gray-50">
                    <div class="bg-gray-50 p-5 rounded-[24px] flex items-center justify-between border border-gray-100 overflow-hidden">
                        <div class="truncate mr-2">
                            <p class="text-[12px] font-black truncate">${u.name}</p>
                            <p class="text-[9px] text-gray-400 uppercase font-bold tracking-widest">${u.role}</p>
                        </div>
                        <button onclick="window.handleLogout()" class="text-red-400 hover:text-red-600 p-2"><i class="fas fa-power-off"></i></button>
                    </div>
                </div>
            </aside>`;
        }

        function getContentLayout() {
            const u = state.user;
            
            if (state.activeTab === 'dashboard') {
                return `
                <div class="mb-10"><h2 class="text-4xl font-black text-gray-800">Ringkasan</h2></div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="md:col-span-2 bg-white p-10 rounded-[40px] shadow-sm border border-gray-100 relative group">
                        <p class="text-blue-600 text-[10px] font-black uppercase tracking-widest mb-4">Profil Saya</p>
                        <h3 class="text-3xl font-black text-gray-800 mb-6">${u.name}</h3>
                        <div class="flex flex-wrap gap-3">
                            <span class="bg-blue-50 text-blue-700 px-5 py-2 rounded-2xl text-[11px] font-black uppercase">Role: ${u.role}</span>
                            ${u.subject ? `<span class="bg-indigo-50 text-indigo-700 px-5 py-2 rounded-2xl text-[11px] font-black uppercase">Mapel: ${u.subject}</span>` : ''}
                            ${u.nis ? `<span class="bg-green-50 text-green-700 px-5 py-2 rounded-2xl text-[11px] font-black uppercase text-xs">NIS: ${u.nis}</span>` : ''}
                        </div>
                    </div>
                    <div class="bg-blue-600 p-10 rounded-[40px] text-white shadow-2xl shadow-blue-200">
                        <p class="text-blue-200 text-[10px] font-black uppercase mb-2">Siswa Aktif</p>
                        <h3 class="text-5xl font-black">${state.students.length} Orang</h3>
                    </div>
                </div>`;
            }

            if (state.activeTab === 'guru') {
                const gurus = Object.keys(state.users).filter(k => state.users[k].role === 'guru');
                return `
                <div class="flex justify-between items-center mb-10">
                    <h2 class="text-4xl font-black text-gray-800 tracking-tight">Data Guru</h2>
                    <button onclick="window.addNewUser('guru')" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black text-xs shadow-xl shadow-blue-100"><i class="fas fa-plus mr-3"></i> Tambah Guru</button>
                </div>
                <div class="bg-white rounded-[32px] border border-gray-100 overflow-hidden shadow-sm">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b border-gray-100"><tr class="text-[10px] font-black text-gray-400 uppercase tracking-widest"><th class="p-8">Identitas</th><th class="p-8">Mapel</th><th class="p-8">Username / Pass</th><th class="p-8 text-center">Aksi</th></tr></thead>
                        <tbody class="divide-y divide-gray-50">
                            ${gurus.map(k => {
                                const g = state.users[k];
                                return `<tr><td class="p-8 font-black text-gray-800">${g.name}</td><td class="p-8 text-indigo-600 font-bold uppercase text-[10px]">${g.subject}</td><td class="p-8 font-mono text-xs text-gray-400">${g.username} / ${g.password}</td><td class="p-8 text-center space-x-2"><button onclick="window.openEditUser('${k}')" class="bg-blue-50 text-blue-500 w-10 h-10 rounded-xl"><i class="fas fa-edit"></i></button><button onclick="window.deleteUserRecord('${k}')" class="bg-red-50 text-red-500 w-10 h-10 rounded-xl"><i class="fas fa-trash"></i></button></td></tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>`;
            }

            if (state.activeTab === 'siswa') {
                return `
                <div class="flex justify-between items-center mb-10">
                    <h2 class="text-4xl font-black text-gray-800">Data Siswa</h2>
                    <button onclick="window.addNewUser('siswa')" class="bg-green-600 text-white px-8 py-4 rounded-2xl font-black text-xs shadow-xl shadow-green-100"><i class="fas fa-plus mr-3"></i> Tambah Siswa</button>
                </div>
                <div class="bg-white rounded-[32px] border border-gray-100 overflow-hidden shadow-sm">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b border-gray-100"><tr class="text-[10px] font-black text-gray-400 uppercase tracking-widest"><th class="p-8">NIS</th><th class="p-8">Nama Lengkap</th><th class="p-8">Login Info</th><th class="p-8 text-center">Aksi</th></tr></thead>
                        <tbody class="divide-y divide-gray-50">
                            ${state.students.map(s => {
                                const uData = Object.values(state.users).find(usr => usr.id === s.id) || {};
                                return `<tr><td class="p-8 font-black text-blue-600">${s.nis}</td><td class="p-8 font-bold text-gray-800">${s.name}</td><td class="p-8 font-mono text-xs text-gray-400 italic">${uData.username || '---'} / ${uData.password || '---'}</td><td class="p-8 text-center space-x-2"><button onclick="window.openEditUser('${uData.username}')" class="bg-blue-50 text-blue-500 w-10 h-10 rounded-xl"><i class="fas fa-edit"></i></button><button onclick="window.deleteUserRecord('${uData.username}')" class="bg-red-50 text-red-500 w-10 h-10 rounded-xl"><i class="fas fa-trash"></i></button></td></tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>`;
            }

            if (state.activeTab === 'absen') {
                if (u.role === 'guru') {
                    return `
                    <h2 class="text-4xl font-black text-gray-800 mb-10 tracking-tight">Presensi Kehadiran - ${u.subject}</h2>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                        <div class="bg-white p-12 rounded-[40px] border shadow-sm text-center">
                            <p class="text-gray-400 text-[10px] font-black uppercase mb-6 tracking-widest">Token Aktif Hari Ini</p>
                            <div class="text-7xl font-black text-blue-600 mb-10 font-mono tracking-widest">${state.activeToken || '-----'}</div>
                            <button onclick="window.generateToken()" class="bg-blue-600 text-white px-12 py-5 rounded-3xl font-black shadow-xl shadow-blue-100 uppercase text-sm">Buat Token Baru</button>
                        </div>
                        <div class="bg-white rounded-[40px] border shadow-sm overflow-hidden flex flex-col">
                            <div class="p-8 bg-gray-50 border-b font-black text-[11px] text-gray-400 uppercase flex items-center"><i class="fas fa-history mr-3 text-blue-600"></i> Kehadiran Semester Ini</div>
                            <div class="overflow-y-auto max-h-[300px] no-scrollbar">
                                <table class="w-full text-left">
                                    <tbody class="divide-y divide-gray-50">
                                        ${state.students.map(s => {
                                            const att = state.attendance[s.id] || { present: 0, total: 48 };
                                            return `<tr class="hover:bg-gray-50/50"><td class="p-5 font-bold text-gray-700 text-sm">${s.name}</td><td class="p-5 text-gray-400 font-bold text-xs">${att.present}/${att.total} Hari</td><td class="p-5 text-right"><span class="px-3 py-1 bg-green-50 text-green-700 rounded-full font-black text-[10px]">${Math.round((att.present/att.total)*100)}%</span></td></tr>`;
                                        }).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>`;
                } else {
                    return `
                    <div class="max-w-xl mx-auto text-center mt-10">
                        <h2 class="text-4xl font-black text-gray-800 mb-4">Presensi Mandiri</h2>
                        <p class="text-gray-400 mb-10 font-medium italic">Masukkan 5-digit token dari guru untuk mencatat kehadiran.</p>
                        <div class="bg-white p-16 rounded-[50px] shadow-2xl border-4 border-white">
                            <div class="bg-blue-50 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-10 text-blue-600 text-3xl animate-pulse"><i class="fas fa-fingerprint"></i></div>
                            <form onsubmit="window.submitToken(event)" class="space-y-10">
                                <input type="text" name="token" maxlength="5" placeholder="_____" required class="w-full text-center text-6xl font-black border-none outline-none p-4 bg-transparent tracking-[0.4em] uppercase font-mono">
                                <button class="w-full bg-blue-600 text-white py-6 rounded-3xl font-black shadow-2xl shadow-blue-200 uppercase">Kirim Presensi</button>
                            </form>
                        </div>
                    </div>`;
                }
            }

            if (state.activeTab === 'nilai') {
                if (u.role === 'guru') {
                    return `
                    <h2 class="text-4xl font-black text-gray-800 mb-10 tracking-tight">Penginputan Nilai: ${u.subject}</h2>
                    <div class="bg-white rounded-[40px] border border-gray-100 shadow-sm overflow-x-auto no-scrollbar">
                        <table class="w-full text-left min-w-[1000px]">
                            <thead class="bg-gray-50 border-b"><tr class="text-[10px] font-black text-gray-400 uppercase tracking-widest"><th class="p-8">Siswa</th>${GRADE_COMPONENTS.map(c => `<th class="p-8 text-center">${c.label}</th>`).join('')}<th class="p-8 text-center text-blue-600 bg-blue-50/30">Rata-rata</th></tr></thead>
                            <tbody class="divide-y divide-gray-50">
                                ${state.students.map(s => {
                                    const g = (state.grades[s.id] && state.grades[s.id][u.subject]) || {};
                                    let sum = 0;
                                    const cells = GRADE_COMPONENTS.map(c => {
                                        const score = g[c.id] || 0; sum += score;
                                        return `<td class="p-4"><input type="number" min="0" max="100" value="${score}" onchange="window.updateGradeValue('${s.id}','${u.subject}','${c.id}',this.value)" class="w-full text-center p-4 bg-gray-50 rounded-2xl focus:bg-white border-2 border-transparent focus:border-blue-500 outline-none font-black text-blue-600"></td>`;
                                    }).join('');
                                    const avg = Math.round(sum / GRADE_COMPONENTS.length);
                                    return `<tr><td class="p-8 font-black text-gray-800">${s.name}<br><span class="text-[9px] text-gray-400 uppercase tracking-widest font-bold">NIS: ${s.nis}</span></td>${cells}<td class="p-8 text-center"><span class="bg-blue-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center mx-auto font-black shadow-xl">${avg}</span></td></tr>`;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>`;
                } else {
                    return `
                    <h2 class="text-4xl font-black text-gray-800 mb-10 tracking-tight">Rapor Hasil Belajar</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        ${SUBJECTS.map(sub => {
                            const g = (state.grades[u.id] && state.grades[u.id][sub]) || null;
                            let total = 0; if (g) GRADE_COMPONENTS.forEach(c => total += (g[c.id] || 0));
                            const avg = g ? Math.round(total / GRADE_COMPONENTS.length) : 0;
                            return `
                            <div class="bg-white p-10 rounded-[40px] border border-gray-100 shadow-sm hover:border-blue-500 transition duration-500">
                                <div class="flex justify-between items-start mb-8">
                                    <div class="bg-blue-50 w-12 h-12 rounded-2xl flex items-center justify-center text-blue-600 text-lg"><i class="fas fa-book"></i></div>
                                    <div class="text-right"><p class="text-[10px] font-black text-gray-300 uppercase tracking-widest">Skor Akhir</p><p class="text-3xl font-black ${avg>=75?'text-green-600':'text-red-500'}">${avg || '-'}</p></div>
                                </div>
                                <h4 class="font-black text-gray-800 text-xl mb-8">${sub}</h4>
                                <div class="space-y-6">${GRADE_COMPONENTS.map(c => `<div class="space-y-2"><div class="flex justify-between items-center text-[10px] font-black uppercase text-gray-400"><span>${c.label}</span><span>${g?g[c.id]||0:0}</span></div><div class="w-full bg-gray-50 h-1.5 rounded-full overflow-hidden"><div class="bg-blue-600 h-full transition-all duration-1000" style="width:${g?g[c.id]||0:0}%"></div></div></div>`).join('')}</div>
                            </div>`;
                        }).join('')}
                    </div>`;
                }
            }
        }

        function getModalLayout() {
            if (!state.editingUser) return '';
            const u = state.editingUser;
            return `
            <div class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-blue-900/60 backdrop-blur-md animate-fade-in">
                <div class="bg-white rounded-[40px] shadow-2xl w-full max-w-lg overflow-hidden border-4 border-white">
                    <div class="bg-blue-600 p-8 flex justify-between items-center text-white"><h3 class="font-black uppercase tracking-widest text-sm">Edit Data ${u.role}</h3><button onclick="window.closeModal()"><i class="fas fa-times"></i></button></div>
                    <form onsubmit="window.saveUserData(event)" class="p-10 space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="md:col-span-2"><label class="text-[10px] font-black text-blue-600 uppercase tracking-widest ml-1">Nama Lengkap</label><input type="text" name="name" value="${u.name}" required class="w-full border-b-2 py-3 focus:border-blue-500 outline-none font-bold text-gray-700 bg-transparent"></div>
                            ${u.role==='guru'?`<div class="md:col-span-2"><label class="text-[10px] font-black text-blue-600 uppercase tracking-widest ml-1">Mapel</label><select name="subject" class="w-full border-b-2 py-3 outline-none font-bold bg-transparent">${SUBJECTS.map(s => `<option value="${s}" ${u.subject===s?'selected':''}>${s}</option>`).join('')}</select></div>` : `<div class="md:col-span-2"><label class="text-[10px] font-black text-blue-600 uppercase tracking-widest ml-1">NIS</label><input type="text" name="nis" value="${u.nis}" required class="w-full border-b-2 py-3 focus:border-blue-500 outline-none font-bold text-gray-700 bg-transparent"></div>`}
                            <div><label class="text-[10px] font-black text-blue-600 uppercase tracking-widest ml-1">Username Login</label><input type="text" name="username" value="${u.username}" required class="w-full border-b-2 py-3 outline-none font-bold text-gray-400 bg-transparent" readonly></div>
                            <div><label class="text-[10px] font-black text-blue-600 uppercase tracking-widest ml-1">Password Baru</label><input type="text" name="password" value="${u.password}" required class="w-full border-b-2 py-3 focus:border-blue-500 outline-none font-bold text-blue-600 bg-transparent"></div>
                        </div>
                        <button class="w-full bg-blue-600 text-white font-black py-5 rounded-3xl shadow-xl hover:bg-blue-700 transition transform active:scale-95 uppercase text-sm mt-6">Simpan Perubahan</button>
                    </form>
                </div>
            </div>`;
        }

        // --- SISTEM INISIALISASI ---

        const bootSystem = async () => {
            try {
                const firebaseApp = initializeApp(firebaseConfig);
                auth = getAuth(firebaseApp);
                db = getFirestore(firebaseApp);
                await signInAnonymously(auth);

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        const docRef = doc(db, 'siakad_data', 'main_records', 'v4_5_system', 'global_state');
                        onSnapshot(docRef, (snap) => {
                            if (snap.exists()) {
                                const cloudData = snap.data();
                                updateState({
                                    users: cloudData.users || INITIAL_DB.users,
                                    students: cloudData.students || INITIAL_DB.students,
                                    grades: cloudData.grades || INITIAL_DB.grades,
                                    attendance: cloudData.attendance || INITIAL_DB.attendance,
                                    history: cloudData.history || INITIAL_DB.history,
                                    isLoading: false
                                });
                            } else {
                                pushToCloud();
                                updateState({ isLoading: false });
                            }
                        }, (err) => { 
                            console.error("Firestore Error:", err); 
                            window.forceDemoMode();
                        });
                    }
                });
            } catch (err) { 
                console.error("Boot Error:", err); 
                window.forceDemoMode();
            }
        };

        bootSystem();

    </script>
</body>
</html>
