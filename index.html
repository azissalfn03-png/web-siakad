<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAKAD Terpadu - Sistem Informasi Akademik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        #toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 2rem;
            border-radius: 1rem;
            color: white;
            font-weight: bold;
            z-index: 200;
            display: none;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans" onload="initApp()">

    <div id="toast"></div>
    <div id="app" class="min-h-screen"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- KONFIGURASI ---
        const SUBJECTS = ['Matematika', 'B. Indonesia', 'IPA', 'IPS', 'B. Inggris', 'PJOK', 'Seni Budaya'];
        const GRADE_COMPONENTS = [
            { id: 'keaktifan', label: 'Keaktifan' },
            { id: 'tugas', label: 'Tugas' },
            { id: 'kehadiran', label: 'Kehadiran' },
            { id: 'kesopanan', label: 'Kesopanan' }
        ];

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'siakad-v3-final';

        const INITIAL_STATE = {
            users: {
                'admin': { id: 'u0', username: 'admin', password: '123', role: 'admin', name: 'Super Admin' },
                'guru': { id: 'u1', username: 'guru', password: '123', role: 'guru', name: 'Drs. Bambang', subject: 'Matematika' },
                'siswa': { id: 'u2', username: 'siswa', password: '123', role: 'siswa', name: 'Budi Santoso', nis: '10001' }
            },
            students: [
                { id: 'u2', name: 'Budi Santoso', nis: '10001' }
            ],
            grades: {
                'u2': { 'Matematika': { keaktifan: 80, tugas: 85, kehadiran: 90, kesopanan: 95 } }
            },
            attendance: {
                'u2': { present: 42, total: 48 }
            },
            history: {
                'u2': { avg: 85, attendance: '98%' }
            }
        };

        let state = {
            ...INITIAL_STATE,
            user: null, 
            activeTab: 'dashboard',
            activeToken: null,
            attendedToday: [], 
            editingUser: null,
            isLoading: true
        };

        // --- CORE FUNCTIONS ---
        async function syncToCloud() {
            if (!auth.currentUser) return;
            try {
                // Jalur 6 segmen (Genap): artifacts -> appId -> public -> data -> siakad_db -> state_document
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'siakad_db', 'state_document');
                await setDoc(docRef, {
                    users: state.users,
                    students: state.students,
                    grades: state.grades,
                    attendance: state.attendance,
                    history: state.history
                }, { merge: true });
            } catch (err) {
                console.error("Cloud Sync Error:", err);
            }
        }

        function showToast(text, type = 'success') {
            const toast = document.getElementById('toast');
            toast.innerText = text;
            toast.style.display = 'block';
            toast.style.backgroundColor = type === 'success' ? '#10B981' : '#EF4444';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        function updateState(newState) {
            state = { ...state, ...newState };
            render();
        }

        window.initApp = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) { console.error("Auth Error:", err); }

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'siakad_db', 'state_document');
                    onSnapshot(docRef, (docSnap) => {
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            updateState({
                                users: data.users || state.users,
                                students: data.students || state.students,
                                grades: data.grades || state.grades,
                                attendance: data.attendance || state.attendance,
                                history: data.history || state.history,
                                isLoading: false
                            });
                        } else {
                            syncToCloud();
                            updateState({ isLoading: false });
                        }
                    }, () => updateState({ isLoading: false }));
                }
            });
        };

        // --- HANDLERS ---
        window.handleLogin = (e) => {
            e.preventDefault();
            const u = e.target.username.value;
            const p = e.target.password.value;
            if (state.users[u] && state.users[u].password === p) {
                updateState({ user: state.users[u], activeTab: 'dashboard' });
            } else { showToast('Login Gagal!', 'error'); }
        };

        window.handleLogout = () => { updateState({ user: null, activeTab: 'dashboard', activeToken: null }); };
        window.switchTab = (t) => { updateState({ activeTab: t }); };

        window.generateToken = () => {
            const token = Math.random().toString(36).substring(2, 7).toUpperCase();
            updateState({ activeToken: token, attendedToday: [] });
            showToast('Token Dibuat');
        };

        window.submitToken = async (e) => {
            e.preventDefault();
            const t = e.target.token.value.toUpperCase();
            if (!state.activeToken) return showToast('Token tidak aktif', 'error');
            if (t === state.activeToken) {
                if (!state.attendedToday.includes(state.user.id)) {
                    state.attendedToday.push(state.user.id);
                    const sId = state.user.id;
                    if (!state.attendance[sId]) state.attendance[sId] = { present: 0, total: 48 };
                    state.attendance[sId].present += 1;
                    updateState({ attendedToday: state.attendedToday, attendance: state.attendance });
                    await syncToCloud();
                    showToast('Berhasil Absen');
                } else { showToast('Sudah absen hari ini', 'error'); }
            } else { showToast('Token Salah!', 'error'); }
        };

        window.updateGrade = async (sId, subject, comp, val) => {
            const score = Math.min(100, Math.max(0, parseInt(val) || 0));
            if (!state.grades[sId]) state.grades[sId] = {};
            if (!state.grades[sId][subject]) state.grades[sId][subject] = {};
            state.grades[sId][subject][comp] = score;
            updateState({ grades: state.grades });
            await syncToCloud();
        };

        window.openEditModal = (username) => { updateState({ editingUser: { ...state.users[username], oldUsername: username } }); };
        window.closeEditModal = () => { updateState({ editingUser: null }); };

        window.saveUser = async (e) => {
            e.preventDefault();
            const f = e.target;
            const newUser = {
                id: state.editingUser.id,
                username: f.username.value,
                password: f.password.value,
                name: f.name.value,
                role: state.editingUser.role,
                subject: f.subject ? f.subject.value : state.editingUser.subject,
                nis: f.nis ? f.nis.value : state.editingUser.nis
            };
            if (state.editingUser.oldUsername !== newUser.username && state.users[newUser.username]) return showToast('User sudah ada!', 'error');
            if (state.editingUser.oldUsername !== newUser.username) delete state.users[state.editingUser.oldUsername];
            state.users[newUser.username] = newUser;
            if (newUser.role === 'siswa') {
                const idx = state.students.findIndex(s => s.id === newUser.id);
                if (idx !== -1) state.students[idx] = { id: newUser.id, name: newUser.name, nis: newUser.nis };
            }
            updateState({ users: state.users, students: state.students, editingUser: null });
            await syncToCloud();
            showToast('Data Diperbarui');
        };

        window.addUser = async (role) => {
            const name = prompt(`Nama ${role}:`);
            if (!name) return;
            const username = prompt(`Username:`);
            if (!username || state.users[username]) return showToast('User tidak valid!', 'error');
            const id = (role === 'siswa' ? 's' : 'g') + Date.now();
            const newUser = { id, username, password: '123', role, name };
            if (role === 'guru') newUser.subject = SUBJECTS[0];
            if (role === 'siswa') {
                newUser.nis = '10' + (100 + state.students.length);
                state.students.push({ id, name, nis: newUser.nis });
            }
            state.users[username] = newUser;
            updateState({ users: state.users, students: state.students });
            await syncToCloud();
        };

        window.deleteUser = async (u) => {
            if (!confirm('Hapus user?')) return;
            const usr = state.users[u];
            if (usr.role === 'siswa') state.students = state.students.filter(s => s.id !== usr.id);
            delete state.users[u];
            updateState({ users: state.users, students: state.students });
            await syncToCloud();
        };

        // --- RENDERERS ---
        function render() {
            const app = document.getElementById('app');
            if (state.isLoading) {
                app.innerHTML = `<div class="flex items-center justify-center min-h-screen bg-blue-900 text-white font-bold"><i class="fas fa-spinner fa-spin mr-3"></i> Memuat Sistem...</div>`;
                return;
            }
            if (!state.user) {
                app.innerHTML = getLoginHTML();
            } else {
                app.innerHTML = `
                <div class="flex flex-col md:flex-row min-h-screen">
                    ${getSidebarHTML()}
                    <main class="flex-1 p-4 md:p-8 overflow-y-auto bg-gray-50">
                        <div class="max-w-6xl mx-auto animate-fade-in">
                            ${getContentHTML()}
                        </div>
                    </main>
                    ${getModalHTML()}
                </div>`;
            }
        }

        function getLoginHTML() {
            return `
            <div class="flex items-center justify-center min-h-screen bg-blue-900 p-4">
                <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden animate-fade-in">
                    <div class="bg-blue-600 p-10 text-center text-white">
                        <i class="fas fa-university text-6xl mb-4"></i>
                        <h1 class="text-3xl font-black">SIAKAD v3.4</h1>
                        <p class="opacity-70 text-sm">Sistem Informasi Akademik Sekolah</p>
                    </div>
                    <form onsubmit="handleLogin(event)" class="p-10 space-y-6">
                        <div>
                            <label class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Username</label>
                            <input type="text" name="username" required class="w-full border-b-2 py-3 focus:border-blue-500 outline-none transition font-medium">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Password</label>
                            <input type="password" name="password" required class="w-full border-b-2 py-3 focus:border-blue-500 outline-none transition font-medium">
                        </div>
                        <button class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-xl hover:bg-blue-700 transition transform active:scale-95">LOGIN</button>
                    </form>
                    <div class="p-4 bg-gray-50 text-center text-[10px] text-gray-400 font-bold uppercase">Demo: admin/123 • guru/123 • siswa/123</div>
                </div>
            </div>`;
        }

        function getSidebarHTML() {
            const u = state.user;
            const nav = [{ id: 'dashboard', label: 'Dashboard', icon: 'fa-th-large' }];
            if (u.role === 'admin') {
                nav.push({ id: 'manage_guru', label: 'Data Guru', icon: 'fa-chalkboard-teacher' }, { id: 'manage_siswa', label: 'Data Siswa', icon: 'fa-user-graduate' });
            } else {
                nav.push({ id: 'absensi', label: 'Absensi', icon: 'fa-calendar-check' }, { id: 'nilai', label: 'Nilai Pelajaran', icon: 'fa-star' });
            }
            return `
            <aside class="w-full md:w-72 bg-white border-r border-gray-100 flex flex-col shadow-sm">
                <div class="p-8 border-b flex items-center space-x-3 text-blue-600">
                    <div class="bg-blue-600 p-2 rounded-xl text-white"><i class="fas fa-graduation-cap"></i></div>
                    <span class="font-black text-2xl tracking-tighter italic">SIAKAD</span>
                </div>
                <nav class="p-6 flex-1 space-y-2">
                    ${nav.map(i => `
                        <button onclick="switchTab('${i.id}')" class="w-full flex items-center space-x-4 px-5 py-4 rounded-2xl transition font-bold text-sm ${state.activeTab===i.id?'bg-blue-600 text-white shadow-lg shadow-blue-200':'text-gray-400 hover:bg-gray-50 hover:text-blue-600'}">
                            <i class="fas ${i.icon} w-6"></i><span>${i.label}</span>
                        </button>
                    `).join('')}
                </nav>
                <div class="p-6 border-t">
                    <div class="bg-gray-50 p-4 rounded-2xl flex items-center space-x-3">
                        <div class="w-10 h-10 rounded-xl bg-blue-100 flex items-center justify-center text-blue-600 font-black">${u.name[0]}</div>
                        <div class="flex-1 min-w-0 text-left">
                            <p class="text-[11px] font-black truncate">${u.name}</p>
                            <p class="text-[9px] text-gray-400 uppercase font-black">${u.role} ${u.subject?`• ${u.subject}`:''}</p>
                        </div>
                        <button onclick="handleLogout()" class="text-red-400 hover:text-red-600"><i class="fas fa-power-off"></i></button>
                    </div>
                </div>
            </aside>`;
        }

        function getContentHTML() {
            const u = state.user;
            switch(state.activeTab) {
                case 'dashboard':
                    return `
                        <h2 class="text-3xl font-black mb-8 text-gray-800">Beranda</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm">
                                <p class="text-gray-400 text-[10px] font-black uppercase tracking-widest mb-2">Profil</p>
                                <h3 class="text-2xl font-black">${u.name}</h3>
                                <div class="mt-4 flex gap-2">
                                    <span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter">${u.role}</span>
                                    ${u.subject ? `<span class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter">${u.subject}</span>` : ''}
                                </div>
                            </div>
                            ${u.role === 'siswa' ? `
                                <div class="bg-blue-600 p-8 rounded-3xl text-white shadow-xl shadow-blue-100">
                                    <p class="text-blue-200 text-[10px] font-black uppercase mb-2">Kehadiran Semester Ini</p>
                                    <h3 class="text-4xl font-black">${Math.round((state.attendance[u.id]?.present/state.attendance[u.id]?.total)*100) || 0}%</h3>
                                    <p class="mt-2 text-xs opacity-70 italic font-medium">${state.attendance[u.id]?.present || 0} dari ${state.attendance[u.id]?.total || 48} hari masuk.</p>
                                </div>
                            ` : ''}
                        </div>`;
                case 'manage_guru':
                    const gurus = Object.keys(state.users).filter(k => state.users[k].role === 'guru');
                    return `
                        <div class="flex justify-between items-center mb-8">
                            <h2 class="text-3xl font-black">Data Guru</h2>
                            <button onclick="addUser('guru')" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold shadow-md hover:bg-blue-700">Tambah Guru</button>
                        </div>
                        <div class="bg-white rounded-3xl border shadow-sm overflow-hidden">
                            <table class="w-full text-left">
                                <thead class="bg-gray-50 border-b"><tr class="text-[10px] font-black text-gray-400 uppercase tracking-widest"><th class="p-6">Nama</th><th class="p-6">Mapel</th><th class="p-6 text-center">Aksi</th></tr></thead>
                                <tbody class="divide-y divide-gray-50">
                                    ${gurus.map(k => `<tr><td class="p-6 font-bold text-gray-700">${state.users[k].name}</td><td class="p-6 font-black text-indigo-600 text-xs">${state.users[k].subject}</td><td class="p-6 text-center space-x-2">
                                        <button onclick="openEditModal('${k}')" class="text-blue-500 bg-blue-50 w-8 h-8 rounded-xl"><i class="fas fa-edit"></i></button>
                                        <button onclick="deleteUser('${k}')" class="text-red-500 bg-red-50 w-8 h-8 rounded-xl"><i class="fas fa-trash"></i></button>
                                    </td></tr>`).join('')}
                                </tbody>
                            </table>
                        </div>`;
                case 'manage_siswa':
                    const siswas = Object.keys(state.users).filter(k => state.users[k].role === 'siswa');
                    return `
                        <div class="flex justify-between items-center mb-8">
                            <h2 class="text-3xl font-black">Data Siswa</h2>
                            <button onclick="addUser('siswa')" class="bg-green-600 text-white px-6 py-3 rounded-2xl font-bold shadow-md hover:bg-green-700">Tambah Siswa</button>
                        </div>
                        <div class="bg-white rounded-3xl border shadow-sm overflow-hidden">
                            <table class="w-full text-left">
                                <thead class="bg-gray-50 border-b"><tr class="text-[10px] font-black text-gray-400 uppercase tracking-widest"><th class="p-6">NIS</th><th class="p-6">Nama</th><th class="p-6 text-center">Aksi</th></tr></thead>
                                <tbody class="divide-y divide-gray-50">
                                    ${siswas.map(k => `<tr><td class="p-6 font-black text-blue-600">${state.users[k].nis}</td><td class="p-6 font-bold text-gray-700">${state.users[k].name}</td><td class="p-6 text-center space-x-2">
                                        <button onclick="openEditModal('${k}')" class="text-blue-500 bg-blue-50 w-8 h-8 rounded-xl"><i class="fas fa-edit"></i></button>
                                        <button onclick="deleteUser('${k}')" class="text-red-500 bg-red-50 w-8 h-8 rounded-xl"><i class="fas fa-trash"></i></button>
                                    </td></tr>`).join('')}
                                </tbody>
                            </table>
                        </div>`;
                case 'absensi':
                    if (u.role === 'guru') {
                        return `
                        <h2 class="text-3xl font-black mb-8 text-gray-800">Absensi - ${u.subject}</h2>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                            <div class="bg-white p-12 rounded-3xl border shadow-sm text-center">
                                <p class="text-gray-400 font-black text-[10px] uppercase mb-4 tracking-widest">Token Hari Ini</p>
                                <div class="text-6xl font-black text-blue-600 mb-8 font-mono">${state.activeToken || '-----'}</div>
                                <button onclick="generateToken()" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-bold">GENERATE TOKEN</button>
                            </div>
                            <div class="bg-white rounded-3xl border shadow-sm overflow-hidden flex flex-col">
                                <div class="p-6 bg-gray-50 border-b font-black text-[10px] text-gray-400 uppercase">Rekap Kehadiran Semester Ini</div>
                                <div class="overflow-y-auto max-h-[300px]">
                                    <table class="w-full text-left text-sm">
                                        <tbody class="divide-y divide-gray-50">
                                            ${state.students.map(s => {
                                                const att = state.attendance[s.id] || { present: 0, total: 48 };
                                                const pct = Math.round((att.present/att.total)*100);
                                                return `<tr><td class="p-4 font-bold text-gray-700">${s.name}</td><td class="p-4 text-gray-400 text-xs">${att.present}/${att.total} Hr</td><td class="p-4 text-right"><span class="px-3 py-1 rounded-full text-[10px] font-black ${pct>80?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${pct}%</span></td></tr>`;
                                            }).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                        <div class="mt-8 bg-amber-50 p-8 rounded-3xl border border-amber-100">
                            <h4 class="font-black text-amber-700 text-xs uppercase mb-4 tracking-widest"><i class="fas fa-history mr-2"></i>History Semester Sebelumnya</h4>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                ${state.students.map(s => {
                                    const h = state.history[s.id] || { avg: 0, attendance: '0%' };
                                    return `<div class="bg-white p-4 rounded-2xl border border-amber-100 text-[11px] font-bold flex justify-between shadow-sm text-amber-800"><span>${s.name}</span><span class="opacity-50">Nilai: ${h.avg} | Abs: ${h.attendance}</span></div>`;
                                }).join('')}
                            </div>
                        </div>`;
                    } else {
                        return `
                        <h2 class="text-3xl font-black mb-8 text-gray-800">Presensi Kehadiran</h2>
                        <div class="bg-white p-12 rounded-3xl shadow-sm max-w-md mx-auto text-center border">
                            <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6 text-3xl shadow-inner"><i class="fas fa-fingerprint"></i></div>
                            <form onsubmit="submitToken(event)" class="space-y-6">
                                <input type="text" name="token" maxlength="5" placeholder="_____" required class="w-full text-center text-5xl font-black tracking-[0.5em] uppercase border-b-4 focus:border-blue-600 outline-none p-4 font-mono transition bg-transparent">
                                <button class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-xl">ABSEN SEKARANG</button>
                            </form>
                        </div>`;
                    }
                case 'nilai':
                    if (u.role === 'guru') {
                        return `
                        <h2 class="text-3xl font-black mb-8 text-gray-800">Input Nilai: ${u.subject}</h2>
                        <div class="bg-white rounded-3xl border shadow-sm overflow-x-auto">
                            <table class="w-full text-left min-w-[900px]">
                                <thead class="bg-gray-50 border-b"><tr class="text-[10px] font-black text-gray-400 uppercase tracking-widest"><th class="p-6">Siswa</th>${GRADE_COMPONENTS.map(c => `<th class="p-6 text-center">${c.label}</th>`).join('')}<th class="p-6 text-center bg-blue-50 text-blue-600">Total Akhir</th></tr></thead>
                                <tbody class="divide-y divide-gray-50">
                                    ${state.students.map(s => {
                                        const sGrades = (state.grades[s.id] && state.grades[s.id][u.subject]) || {};
                                        let sum = 0;
                                        const inputs = GRADE_COMPONENTS.map(c => {
                                            const val = sGrades[c.id] || 0;
                                            sum += val;
                                            return `<td class="p-4"><input type="number" value="${val}" onchange="updateGrade('${s.id}','${u.subject}','${c.id}',this.value)" class="w-full text-center p-3 bg-gray-50 rounded-xl focus:bg-white border-2 border-transparent focus:border-blue-500 outline-none transition font-black text-sm"></td>`;
                                        }).join('');
                                        const avg = Math.round(sum / GRADE_COMPONENTS.length);
                                        return `<tr><td class="p-6"><p class="font-black text-gray-800">${s.name}</p><p class="text-[10px] text-gray-400 font-bold uppercase tracking-tighter">NIS: ${s.nis}</p></td>${inputs}<td class="p-6 text-center"><span class="bg-blue-600 text-white px-5 py-2 rounded-xl font-black shadow-lg shadow-blue-100">${avg}</span></td></tr>`;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>`;
                    } else {
                        return `
                        <h2 class="text-3xl font-black mb-8 text-gray-800">Laporan Hasil Belajar</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${SUBJECTS.map(sub => {
                                const g = (state.grades[u.id] && state.grades[u.id][sub]) || null;
                                let avg = g ? Math.round(GRADE_COMPONENTS.reduce((s, c) => s + (g[c.id] || 0), 0) / GRADE_COMPONENTS.length) : 0;
                                return `<div class="bg-white p-8 rounded-3xl border shadow-sm hover:border-blue-500 transition duration-300"><div class="flex justify-between items-center mb-6"><h4 class="font-black text-gray-800">${sub}</h4><div class="text-2xl font-black ${avg>=75?'text-green-600':'text-red-500'}">${avg || '-'}</div></div><div class="space-y-4">${GRADE_COMPONENTS.map(c => `<div class="space-y-1"><div class="flex justify-between text-[9px] font-black uppercase text-gray-400 tracking-wider"><span>${c.label}</span><span>${g?g[c.id]||0:0}</span></div><div class="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden"><div class="bg-blue-600 h-full transition-all duration-1000" style="width:${g?g[c.id]||0:0}%"></div></div></div>`).join('')}</div></div>`;
                            }).join('')}
                        </div>`;
                    }
                default: return '';
            }
        }

        function getModalHTML() {
            if (!state.editingUser) return '';
            const u = state.editingUser;
            return `
            <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-blue-900/60 backdrop-blur-sm animate-fade-in text-left">
                <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden">
                    <div class="bg-blue-600 p-6 flex justify-between items-center text-white"><h3 class="font-black uppercase tracking-tighter">Edit Akun ${u.role}</h3><button onclick="closeEditModal()"><i class="fas fa-times"></i></button></div>
                    <form onsubmit="saveUser(event)" class="p-8 space-y-5">
                        <div><label class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Nama Lengkap</label><input type="text" name="name" value="${u.name}" required class="w-full border-b-2 py-2 focus:border-blue-500 outline-none font-bold"></div>
                        ${u.role==='guru'?`<div><label class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Mata Pelajaran</label><select name="subject" class="w-full border-b-2 py-2 outline-none font-bold bg-transparent">${SUBJECTS.map(s => `<option value="${s}" ${u.subject===s?'selected':''}>${s}</option>`).join('')}</select></div>` : `<div><label class="text-[10px] font-black text-blue-600 uppercase tracking-widest">NIS</label><input type="text" name="nis" value="${u.nis}" required class="w-full border-b-2 py-2 focus:border-blue-500 outline-none font-bold"></div>`}
                        <div><label class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Username</label><input type="text" name="username" value="${u.username}" required class="w-full border-b-2 py-2 outline-none font-bold text-gray-400"></div>
                        <div><label class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Password Baru</label><input type="text" name="password" value="${u.password}" required class="w-full border-b-2 py-2 outline-none font-bold text-blue-600"></div>
                        <button class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl mt-4 hover:bg-blue-700 transition">SIMPAN PERUBAHAN</button>
                    </form>
                </div>
            </div>`;
        }
    </script>
</body>
</html>
